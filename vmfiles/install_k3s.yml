---
- name: Installation de K3s sur la VM Debian
  hosts: k3s_nodes
  become: yes
  tasks:
    - name: Installer les dépendances système (curl)
      apt:
        name: curl
        state: present
        update_cache: yes

    - name: Télécharger et exécuter le script d'installation k3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: S'assurer que le service k3s est démarré
      systemd:
        name: k3s
        state: started
        enabled: yes

    - name: Attendre que le fichier kubeconfig soit généré
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        timeout: 60  # On réduit ici car le service est censé être lancé

    - name: Ajuster les permissions du fichier config pour l'utilisateur vagrant
      file:
        path: /etc/rancher/k3s/k3s.yaml
        owner: vagrant
        group: vagrant
        mode: '0644'
        
    - name: Créer le dossier pour les manifests k8s dans la VM
      file:
        path: /home/vagrant/k8s
        state: directory
        owner: vagrant
        group: vagrant

    - name: Copier les fichiers manifests de l'hôte vers la VM
      copy:
        src: ./k8s/
        dest: /home/vagrant/k8s/
        owner: vagrant
        group: vagrant